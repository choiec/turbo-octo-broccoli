<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Admin CSV Upload</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.25rem; }
    section { margin: 1.5rem 0; padding: 1rem; border: 1px solid #ccc; border-radius: 6px; }
    label { display: block; margin-top: 0.5rem; }
    input[type="text"] { width: 100%; box-sizing: border-box; padding: 0.5rem; margin-top: 0.25rem; }
    input[type="file"] { margin-top: 0.25rem; }
    button { margin-top: 0.75rem; padding: 0.5rem 1rem; cursor: pointer; }
    .result { margin-top: 0.5rem; white-space: pre-wrap; font-size: 0.875rem; }
    .error { color: #c00; }
  </style>
</head>
<body>
  <h1>Admin CSV Upload</h1>
  <p>Upload CSV files. Access controlled by Cloudflare.</p>

  <section>
    <h2>Lexis Profile</h2>
    <label>CSV/TSV file(s) <input type="file" id="lexis-files" name="files" multiple accept=".csv,.tsv"></label>
    <button type="button" onclick="upload('lexis')">Upload lexis profile</button>
    <div id="lexis-result" class="result"></div>
  </section>
  <section>
    <h2>Lexis Item</h2>
    <label>JSON file(s) <input type="file" id="lexis-item-files" name="files" multiple accept=".json"></label>
    <button type="button" onclick="upload('lexis-item')">Upload lexis item</button>
    <div id="lexis-item-result" class="result"></div>
  </section>
  <section>
    <h2>OEWN 2025 Senses</h2>
    <p>Upload <code>oewn_2025_senses.json</code> from <code>scripts/fetch_oewn.py</code>. Creates LexisItem nodes only (no LexisSet).</p>
    <label>JSON file(s) <input type="file" id="lexis-oewn-files" name="files" multiple accept=".json"></label>
    <button type="button" onclick="upload('lexis-oewn')">Upload OEWN senses</button>
    <div id="lexis-oewn-result" class="result"></div>
  </section>
  <section>
    <h2>Lexis Set</h2>
    <label>JSON file(s) <input type="file" id="lexis-set-files" name="files" multiple accept=".json"></label>
    <button type="button" onclick="upload('lexis-set')">Upload lexis set</button>
    <div id="lexis-set-result" class="result"></div>
  </section>
  <section>
    <h2>Grammar</h2>
    <label>CSV file(s) <input type="file" id="grammar-files" name="files" multiple accept=".csv"></label>
    <button type="button" onclick="upload('grammar')">Upload grammar</button>
    <div id="grammar-result" class="result"></div>
  </section>
  <section>
    <h2>Grammar Set</h2>
    <label>JSON file(s) <input type="file" id="grammar-unit-files" name="files" multiple accept=".json"></label>
    <button type="button" onclick="upload('grammar-unit')">Upload grammar set</button>
    <div id="grammar-unit-result" class="result"></div>
  </section>
  <section>
    <h2>Grammar Item</h2>
    <label>JSON file(s) <input type="file" id="grammar-item-files" name="files" multiple accept=".json"></label>
    <button type="button" onclick="upload('grammar-item')">Upload grammar item</button>
    <div id="grammar-item-result" class="result"></div>
  </section>
  <section>
    <h2>Chunk</h2>
    <label>JSON file(s) <input type="file" id="chunk-files" name="files" multiple accept=".json"></label>
    <button type="button" onclick="upload('chunk')">Upload chunk</button>
    <div id="chunk-result" class="result"></div>
  </section>
  <section>
    <h2>Task</h2>
    <label>JSON file(s) <input type="file" id="task-files" name="files" multiple accept=".json"></label>
    <button type="button" onclick="upload('task')">Upload task</button>
    <div id="task-result" class="result"></div>
  </section>

  <script>
    function upload(kind) {
      var input = document.getElementById(kind + '-files');
      var resultEl = document.getElementById(kind + '-result');
      if (!input.files.length) {
        resultEl.textContent = 'Select at least one file.';
        resultEl.className = 'result error';
        return;
      }
      var fd = new FormData();
      for (var i = 0; i < input.files.length; i++) fd.append('files', input.files[i]);
      resultEl.textContent = 'Uploading...';
      resultEl.className = 'result';
      fetch('/admin/upload/' + kind, {
        method: 'POST',
        body: fd
      }).then(function(r) {
        return r.text().then(function(text) {
          var data;
          try { data = JSON.parse(text); } catch (e) {
            resultEl.textContent = (r.status ? r.status + ' ' : '') + (text || 'Not JSON');
            resultEl.className = 'result error';
            return;
          }
          if (r.ok) resultEl.textContent = JSON.stringify(data, null, 2);
          else {
            resultEl.textContent = (data.detail || r.status) + '\n' + JSON.stringify(data, null, 2);
          }
          if (!r.ok) resultEl.className = 'result error';
        });
      }).catch(function(e) {
        resultEl.textContent = 'Error: ' + e.message;
        resultEl.className = 'result error';
      });
    }
  </script>
</body>
</html>
